name: Autonomous agents

# Runs a Sawit Finance agent cycle in CI, signs real Casper Testnet transactions,
# and commits the resulting agent state back to the repo. Because sawitfinance.xyz
# reads agents/.*state.json at runtime, that commit triggers a Vercel redeploy and
# the Agent Control Room reflects the fresh, on-chain activity.
#
# Orchestrated cadence (each cron differentiated by github.event.schedule):
#   • 17 6 * * *  daily  → Market Analyst  (GORR tuning; honest, cooldown-gated)
#   • 37 6 * * *  daily  → Allocation      (poll + screen new SAWIT-buy deposits)
#   • 0 6 1 * *   monthly→ Oracle → Yield   (record production epoch → fund + settle)
#
# workflow_dispatch runs any agent on demand; demo=true forces one guaranteed on-chain
# GORR change (Market Analyst) so a manual trigger always yields a fresh tx for recording.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CASPER_SECRET_KEY_PEM  contents of the operator secret_key.pem (testnet key)
#   ROOT_ENV               contents of the repo-root .env (ODRA livenet config)
#   AGENTS_ENV             contents of agents/.env (contract hashes, GEMINI_API_KEY, …)

on:
  workflow_dispatch:
    inputs:
      agent:
        description: Which agent(s) to run
        type: choice
        default: market-analyst
        options: [market-analyst, oracle, yield-router, allocation, oracle-then-yield, all]
      demo:
        description: Force one guaranteed on-chain GORR change (for recording)
        type: boolean
        default: true
      force_yield:
        description: Force yield_router to distribute a fresh epoch now (bypass monthly gate)
        type: boolean
        default: false
  schedule:
    - cron: "17 6 * * *"   # daily — Market Analyst (GORR)
    - cron: "37 6 * * *"   # daily — Allocation (deposit screening)
    - cron: "0 6 1 * *"    # monthly — Oracle → Yield (production + distribution epoch)

permissions:
  contents: write

concurrency:
  group: autonomous-agents
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Resolve run parameters
        id: flags
        run: |
          force_yield=false
          case "${{ github.event_name }}:${{ github.event.schedule }}" in
            schedule:"17 6 * * *") agent=market-analyst;   demo=false ;;
            schedule:"37 6 * * *") agent=allocation;        demo=false ;;
            schedule:"0 6 1 * *")  agent=oracle-then-yield; demo=false ;;
            schedule:*)            agent=market-analyst;    demo=false ;;
            *)                     agent="${{ github.event.inputs.agent }}"; demo="${{ github.event.inputs.demo }}"; force_yield="${{ github.event.inputs.force_yield }}" ;;
          esac
          echo "agent=$agent"             >> "$GITHUB_OUTPUT"
          echo "demo=$demo"               >> "$GITHUB_OUTPUT"
          echo "force_yield=$force_yield" >> "$GITHUB_OUTPUT"
          echo "Resolved: agent=$agent demo=$demo force_yield=$force_yield"

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent deps
        run: pip install -r agents/requirements.txt

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build livenet bins
        # Builds every deploy bin (read_state, set_gorr, record, fund, set_claimable,
        # read_balance, allocate, …) so any agent path has the bridge it needs.
        run: cargo build -p sawit-deploy --release --features livenet

      - name: Reconstruct livenet env + operator key
        env:
          CASPER_SECRET_KEY_PEM: ${{ secrets.CASPER_SECRET_KEY_PEM }}
          ROOT_ENV: ${{ secrets.ROOT_ENV }}
          AGENTS_ENV: ${{ secrets.AGENTS_ENV }}
        run: |
          set -e
          mkdir -p "$HOME/.casper-keys"
          printf '%s\n' "$CASPER_SECRET_KEY_PEM" > "$HOME/.casper-keys/secret_key.pem"
          chmod 600 "$HOME/.casper-keys/secret_key.pem"
          printf '%s\n' "$ROOT_ENV" > .env
          # Force the key path to the CI-materialized pem (dotenv: last key wins).
          printf '\nODRA_CASPER_LIVENET_SECRET_KEY_PATH=%s\n' "$HOME/.casper-keys/secret_key.pem" >> .env
          printf '%s\n' "$AGENTS_ENV" > agents/.env

      - name: Run agent cycle
        working-directory: agents
        env:
          AUTONOMY_MODE: "on"
          DEMO_FORCE_GORR: ${{ steps.flags.outputs.demo }}
        run: |
          set -e
          YF=""; [ "${{ steps.flags.outputs.force_yield }}" = "true" ] && YF="--force"
          case "${{ steps.flags.outputs.agent }}" in
            market-analyst)    python market_analyst_agent.py --once ;;
            oracle)            python oracle_agent.py --once ;;
            yield-router)      python yield_router.py --once $YF ;;
            allocation)        python allocation_agent.py --once ;;
            oracle-then-yield) python oracle_agent.py --once && python yield_router.py --once $YF ;;
            all)               python market_analyst_agent.py --once && python oracle_agent.py --once && python yield_router.py --once $YF && python allocation_agent.py --once ;;
            *)                 python market_analyst_agent.py --once ;;
          esac

      - name: Commit + push agent state
        run: |
          set -e
          git config user.name  "sawit-agent-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for f in .market_state.json .oracle_provenance.json .allocation_state.json .yield_state.json; do
            [ -f "agents/$f" ] && git add -f "agents/$f"
          done
          if git diff --staged --quiet; then
            echo "No agent state changes to commit (no-op cycle)."
          else
            git commit -m "chore(agents): autonomous cycle state $(date -u +%FT%TZ) [skip ci]"
            git push || (git pull --rebase origin main && git push)
            echo "Pushed fresh agent state — Vercel will redeploy sawitfinance.xyz."
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Autonomous agent cycle" >> "$GITHUB_STEP_SUMMARY"
          echo "- agent: \`${{ steps.flags.outputs.agent }}\`  demo: \`${{ steps.flags.outputs.demo }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f agents/.market_state.json ]; then
            tx=$(python -c "import json;print(json.load(open('agents/.market_state.json')).get('last_gorr_change_deploy') or '-')" 2>/dev/null || echo '-')
            echo "- latest GORR tx: [\`$tx\`](https://testnet.cspr.live/transaction/$tx)" >> "$GITHUB_STEP_SUMMARY"
          fi
