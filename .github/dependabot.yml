version: 2
updates:
  # Rust smart contracts (workspace at repo root)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"

  # Next.js frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      # Major bumps break the CSPR.click UI stack (reakit targets React 16/17
      # internals). Next 15/16 + React 19 crashed the live app; see rollback in
      # git history. Stay on patched 14.x until CSPR.click supports newer React.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Python AI agents
  - package-ecosystem: "pip"
    directory: "/agents"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "agents"
    ignore:
      # pycspr (Casper SDK) pins cryptography <43; newer majors are uninstallable.
      - dependency-name: "cryptography"
        versions: [">=43.0.0"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
